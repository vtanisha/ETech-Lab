name: CrediRisk Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test_frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Clean Install
      run: npm ci
      working-directory: ./frontend
    - name: Check TypeScript Build & Output 
      run: npm run build
      working-directory: ./frontend
      
  build_container_architecture:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Test Docker Compose Orchestration Validity (Dry Run)
      run: docker compose config
    - name: Build PyTorch Database Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false
        tags: credirisk-backend:local-ci
